name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build
        # We don't necessarily need env vars for the build if they are available in the client, 
        # but to be safe we pass them if you set them in GitHub Secrets.

      - name: Prepare Deployment Package
        run: |
          rm -rf .next/cache
          cat << 'EOF' > unzip.php
          <?php
          $zip = new ZipArchive;
          if ($zip->open('deploy.zip') === TRUE) {
              $zip->extractTo('./');
              $zip->close();
              unlink('deploy.zip');
              exec('chmod -R 755 .next');
              if (!is_dir('tmp')) mkdir('tmp');
              touch('tmp/restart.txt');
              echo "SUCCESS";
          } else {
              echo "FAILED";
          }
          unlink(__FILE__);
          ?>
          EOF
          
          # Zip only necessary files for production
          zip -q -r deploy.zip .next public package.json server.js src components hooks utils lib tsconfig.json tailwind.config.ts postcss.config.mjs components.json next.config.ts
          
          mkdir deploy_dist
          mv deploy.zip deploy_dist/
          mv unzip.php deploy_dist/

      - name: Upload to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_dist/
          dangerous-clean-slate: false

      - name: Trigger Extraction and Restart
        run: |
          echo "Triggering extraction on server..."
          curl -s https://inventory.mostafa3slia.com/unzip.php
